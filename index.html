<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Benemont Pipeline</title>
<style>
  :root{
    --paper:#F1F0EA;        /* warm light gray background */
    --surface:#FFFFFF;       /* cards */
    --ink:#191A17;           /* primary text */
    --muted:#6C6E66;         /* secondary text */
    --hair:#E3E1D8;          /* hairline borders */
    --brand:#15564A;         /* Benemont pine */
    --done:#A6A89E;          /* crossed-out text */
    /* stage accents */
    --prospects:#2563A8;
    --todo:#6D5BD0;
    --activePeo:#B45309;
    --openEnrollment:#C2410C;
    --closed:#15803D;
    --deadLost:#737771;
    --clients:#15564A;
    --radius:14px;
    --shadow:0 1px 2px rgba(25,26,23,.05), 0 4px 14px rgba(25,26,23,.04);
    font-synthesis:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.45;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  a{color:inherit;}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:30;
    background:var(--paper);
    border-bottom:1px solid var(--hair);
    padding:14px 16px 0;
    padding-top:calc(14px + env(safe-area-inset-top));
  }
  .titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .brand{
    font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--brand);
  }
  h1{
    margin:2px 0 0;font-size:25px;font-weight:800;letter-spacing:-.02em;
  }
  .sync{
    font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:#C9A227;display:inline-block;}
  .dot.live{background:var(--closed);}

  .search{position:relative;margin:12px 0 10px;}
  .search input{
    width:100%;font-size:16px;padding:11px 14px 11px 38px;
    border:1px solid var(--hair);border-radius:11px;background:var(--surface);
    color:var(--ink);outline:none;
  }
  .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,86,74,.12);}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;}

  /* ---------- Tabs ---------- */
  nav{
    display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
    padding:2px 0 12px;margin:0 -16px;padding-left:16px;padding-right:16px;
  }
  nav::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;border:1px solid var(--hair);background:var(--surface);
    border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;
    color:var(--muted);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;
    transition:background .15s,color .15s,border-color .15s;
  }
  .tab .count{
    font-size:12px;font-weight:700;min-width:20px;height:20px;border-radius:999px;
    display:inline-flex;align-items:center;justify-content:center;padding:0 6px;
    background:var(--paper);color:var(--muted);
  }
  .tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
  .tab[aria-selected="true"] .count{background:rgba(255,255,255,.18);color:#fff;}
  .tab .swatch{width:8px;height:8px;border-radius:2px;}

  /* ---------- List ---------- */
  main{max-width:760px;margin:0 auto;padding:14px 16px 60px;}
  .stagehead{
    display:flex;align-items:center;justify-content:space-between;
    margin:2px 0 12px;
  }
  .stagehead h2{margin:0;font-size:18px;font-weight:800;letter-spacing:-.01em;}
  .stagehead .desc{font-size:13px;color:var(--muted);margin-top:2px;}
  .donecount{font-size:12px;color:var(--muted);}
  .clearbtn{
    font-size:12px;color:var(--brand);background:none;border:none;cursor:pointer;
    padding:4px 0;font-weight:600;
  }

  .card{
    background:var(--surface);border:1px solid var(--hair);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;
    display:flex;
  }
  .spine{flex:0 0 5px;background:var(--accent,var(--brand));}
  .cardbody{flex:1;padding:13px 14px 13px 13px;display:flex;gap:11px;align-items:flex-start;}
  .check{
    flex:0 0 auto;width:24px;height:24px;border-radius:50%;
    border:2px solid var(--accent,var(--brand));background:transparent;
    cursor:pointer;margin-top:1px;position:relative;transition:background .15s;
  }
  .check::after{
    content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) scale(0);
    transition:transform .15s;
  }
  .content{flex:1;min-width:0;}
  .titleline{font-size:15.5px;font-weight:700;letter-spacing:-.01em;line-height:1.3;}
  .meta{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:5px;font-size:13px;color:var(--muted);}
  .meta a{color:var(--brand);text-decoration:none;font-weight:600;}
  .notes{margin-top:7px;font-size:13.5px;color:#3C3E38;line-height:1.5;white-space:pre-line;}
  .comp{
    display:inline-flex;align-items:center;gap:5px;margin-top:8px;
    font-size:12.5px;font-weight:700;color:var(--closed);
    background:rgba(21,128,61,.08);border-radius:8px;padding:4px 9px;
  }
  .pill{
    font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);background:var(--paper);border-radius:6px;padding:2px 7px;
  }

  /* done state */
  .card.done{opacity:.62;}
  .card.done .check{background:var(--accent,var(--brand));}
  .card.done .check::after{transform:rotate(45deg) scale(1);}
  .card.done .titleline{text-decoration:line-through;color:var(--done);text-decoration-thickness:2px;}
  .card.done .notes,.card.done .comp{text-decoration:line-through;color:var(--done);}

  .empty{
    text-align:center;color:var(--muted);padding:46px 20px;font-size:14.5px;
    border:1px dashed var(--hair);border-radius:var(--radius);
  }
  .empty b{color:var(--ink);}

  footer{
    max-width:760px;margin:0 auto;padding:8px 16px 30px;color:var(--muted);font-size:12px;line-height:1.5;
  }

  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  @media (min-width:620px){ h1{font-size:28px;} }
</style>
</head>

  <div class="titlerow">
    <div>

    </div>

  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="search" placeholder="Search every list…" autocomplete="off" aria-label="Search">
  </div>
  <nav id="tabs" role="tablist"></nav>
</header>

<main>
  <div class="stagehead">
    <div>
      <h2 id="stageHeading"></h2>

    </div>

    </div>

</main>

<footer id="foot"></footer>

   jumps straight to that row in the raw spreadsheet instead. */
const CRM_APP_URL = "https://script.google.com/a/macros/benemont.com/s/AKfycbylTeTfg7TCNkDSVl5gUPpj6dIEYYnNABBLW39iUQqx8gIVFE6mWEk_jAkjse43Rpo/exec";

/* Maps CRM group_type + group_status onto the tabs below.
   group_type is the broad bucket ("Prospect" vs "Client"); when it
   says Prospect, almost everything funnels into your pipeline tabs
   based on group_status. group_status alone is checked second, for
   rows where type doesn't clearly say Prospect/Client (or is blank).
   Add new words here as your Fathom automation introduces them —
   anything not listed falls back to Clients rather than erroring. */
const TYPE_TO_TAB = {
  "prospect":"prospects",
  "to-do":"todo", "to do":"todo",
};
const STATUS_TO_TAB = {
  // prospect-side statuses
  "prospect":"prospects", "new prospect":"prospects", "lead":"prospects",
  "cold lead":"prospects", "warm lead":"prospects", "follow up":"prospects",
  "project 100":"prospects", "referral":"prospects", "contacted":"prospects",
  // to-do
  "to do":"todo", "todo":"todo", "task":"todo",
  // active case / shopping / onboarding
  "active peo":"activePeo", "in progress":"activePeo", "shopping":"activePeo",
  "boarding":"activePeo", "enrollment started":"activePeo", "proposal":"activePeo",
  "proposal sent":"activePeo", "demo scheduled":"activePeo",
  // open enrollment
  "open enrollment":"openEnrollment", "oe":"openEnrollment",
  // closed / won
  "closed":"closed", "closed/won":"closed", "enrolled":"closed", "won":"closed",
  // dead / lost / not interested
  "dead":"deadLost", "lost":"deadLost", "dead/lost":"deadLost",
  "canceled":"deadLost", "cancelled":"deadLost", "not interested":"deadLost",
  // existing book of business
  "existing":"clients", "client":"clients"
};
/* Decide a row's tab: group_type wins when it clearly says Prospect;
   otherwise fall back to group_status; otherwise Clients. */
function stageFor(typeVal, statusVal){
  const t = (typeVal||"").trim().toLowerCase();
  const s = (statusVal||"").trim().toLowerCase();
  if(TYPE_TO_TAB[t] && STATUS_TO_TAB[s] && STATUS_TO_TAB[s]!=="clients"){
    // Prospect-type row with a specific funnel status -> use the status
    // (e.g. type=Prospect, status="Cold Lead" -> prospects, not clients)
    return STATUS_TO_TAB[s];
  }
  if(TYPE_TO_TAB[t]) return TYPE_TO_TAB[t];
  if(STATUS_TO_TAB[s]) return STATUS_TO_TAB[s];
  return "clients";
}

/* ============================================================
   App logic
   ============================================================ */
const STORE_KEY = "benemont_pipeline_done_v1";
let DATA = [...SEED, ...CLIENTS];
let activeTab = STAGES[0].key;
let query = "";

/* crossed-out state — device-only, survives reloads where storage works */
function loadDone(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveDone(d){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }catch(e){}
}
let done = loadDone();
let hideDone = (()=>{ try{ return localStorage.getItem(STORE_KEY+"_hide")==="1"; }catch(e){ return false; } })();
function setHide(v){ hideDone=v; try{ localStorage.setItem(STORE_KEY+"_hide", v?"1":"0"); }catch(e){} }

const stageByKey = Object.fromEntries(STAGES.map(s=>[s.key,s]));
const $ = sel => document.querySelector(sel);

function counts(){
  const c = {};
  STAGES.forEach(s=>c[s.key]=0);
  DATA.forEach(i=>{ if(c[i.stage]!=null) c[i.stage]++; });
  return c;
}

function renderTabs(){
  const c = counts();
  $("#tabs").innerHTML = STAGES.map(s=>`
    <button class="tab" role="tab" data-key="${s.key}" aria-selected="${s.key===activeTab}">
      <span class="swatch" style="background:${s.accent}"></span>${s.label}
      <span class="count">${c[s.key]}</span>
    </button>`).join("");
  $("#tabs").querySelectorAll(".tab").forEach(t=>{
    t.onclick=()=>{ activeTab=t.dataset.key; query=""; $("#search").value=""; render(); 
      t.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"}); };
  });
}

function matches(item){
  if(!query) return true;
  const hay = [item.title,item.notes,item.contact,item.carrier,item.comp,item.phone,item.email].filter(Boolean).join(" ").toLowerCase();
  return hay.includes(query);
}

// Returns {label, bg, fg} for a YYYY-MM-DD due date relative to today.
// Dates that don't parse as YYYY-MM-DD (e.g. free-text like "9/9/26, 1:00 PM")
// are shown as-is with neutral styling rather than being treated as overdue.
function dueInfo(dateStr){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec((dateStr||"").trim());
  if(!m) return {label:dateStr, bg:"transparent", fg:"inherit", plain:true};
  const due = new Date(+m[1], +m[2]-1, +m[3]);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((due-today)/86400000);
  const label = due.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  if(diffDays<0) return {label:label+" (overdue)", bg:"#fed7d7", fg:"#742a2a"};
  if(diffDays===0) return {label:label+" (today)", bg:"#feebc8", fg:"#7b341e"};
  return {label, bg:"#e2e8f0", fg:"#4a5568"};
}

function cardHTML(item){
  const s = stageByKey[item.stage];
  const isDone = !!done[item.id];
  const meta = [];
  if(item.date){
    const info = dueInfo(item.date);
    if(info.plain) meta.push(`<span>📅 ${info.label}</span>`);
    else meta.push(`<span style="font-weight:700;padding:2px 8px;border-radius:10px;background:${info.bg};color:${info.fg};">📅 ${info.label}</span>`);
  }
  if(item.phone) meta.push(`<a href="tel:${item.phone.replace(/[^0-9+]/g,'')}">📞 ${item.phone}</a>`);
  if(item.email) meta.push(`<a href="mailto:${item.email}">✉️ ${item.email}</a>`);
  if(item.contact && item.stage==='clients') meta.push(`<span>👤 ${item.contact}</span>`);
  if(item.carrier && item.stage==='clients') meta.push(`<span class="pill">${item.carrier}</span>`);
  if(item.drive) meta.push(`<a href="${item.drive}" target="_blank" rel="noopener">📁 Drive folder</a>`);
  if(item.stage!=='todo'){
    if(CRM_APP_URL){
      const crmLink = CRM_APP_URL + (CRM_APP_URL.indexOf("?")>=0 ? "&" : "?") + "company=" + encodeURIComponent(item.title);
      meta.push(`<a href="${crmLink}" target="_blank" rel="noopener">📝 Open in CRM</a>`);
    } else if(item.sheetUrl){
      meta.push(`<a href="${item.sheetUrl}" target="_blank" rel="noopener">📝 Open in CRM sheet</a>`);
    }
  }
  const tag = query ? `<span class="pill" style="margin-left:6px">${s.label}</span>` : "";
  // When crossed out, collapse to just the struck-through title — drop the detail.
  const detail = isDone ? "" : `
        ${meta.length?`<div class="meta">${meta.join("")}</div>`:""}
        ${item.notes?`<div class="notes">${item.notes}</div>`:""}
        ${item.comp?`<div class="comp">💰 ${item.comp}</div>`:""}`;
  return `
  <div class="card ${isDone?'done':''}" style="--accent:${s.accent}">
    <div class="spine"></div>
    <div class="cardbody">
      <button class="check" data-id="${item.id}" role="checkbox" aria-checked="${isDone}" aria-label="Cross out ${item.title}"></button>
      <div class="content">
        <div class="titleline">${item.title}${tag}</div>${detail}
      </div>
    </div>
  </div>`;
}

function render(){
  renderTabs();
  const s = stageByKey[activeTab];
  $("#stageTitle").textContent = query ? "Search" : "Pipeline";
  $("#stageHeading").textContent = query ? `Results for "${query}"` : s.label;
  $("#stageDesc").textContent = query ? "Across every list." : s.desc;

  let pool = query ? DATA.filter(matches) : DATA.filter(i=>i.stage===activeTab);
  if(hideDone) pool = pool.filter(i=>!done[i.id]);
  const list = $("#list");

  if(pool.length===0){
    let msg;
    if(query) msg = `Nothing matches <b>"${query}"</b> yet.`;
    else if(hideDone && DATA.some(i=>i.stage===activeTab && done[i.id]))
      msg = `Everything in <b>${s.label}</b> is crossed out.<br>Tap "Show crossed-out" to see them again.`;
    else msg = `No items in <b>${s.label}</b> yet.<br>New ones from the CRM will land here automatically.`;
    list.innerHTML = `<div class="empty">${msg}</div>`;
  } else {
    list.innerHTML = pool.map(cardHTML).join("");
    list.querySelectorAll(".check").forEach(btn=>{
      btn.onclick=()=>{
        const id=btn.dataset.id;
        if(done[id]) delete done[id]; else done[id]=true;
        saveDone(done); render();
      };
    });
  }

  // done counter + buttons (only on a real stage, not search)
  const doneEl=$("#doneCount"), clearEl=$("#clearBtn"), hideEl=$("#hideBtn");
  if(!query){
    const inStage = DATA.filter(i=>i.stage===activeTab);
    const d = inStage.filter(i=>done[i.id]).length;
    doneEl.textContent = d ? `${d} of ${inStage.length} crossed out` : "";
    clearEl.hidden = d===0;
    clearEl.onclick=()=>{ inStage.forEach(i=>delete done[i.id]); saveDone(done); render(); };
    hideEl.hidden = d===0;
    hideEl.textContent = hideDone ? "Show crossed-out" : "Hide crossed-out";
    hideEl.onclick=()=>{ setHide(!hideDone); render(); };
  } else { doneEl.textContent=""; clearEl.hidden=true; hideEl.hidden=true; }
}

/* search */
$("#search").addEventListener("input", e=>{ query=e.target.value.trim().toLowerCase(); render(); });

/* footer / sync status */
function setSync(live){
  $("#syncDot").classList.toggle("live", live);
  $("#syncText").textContent = live
    ? `Live from CRM · updated ${new Date().toLocaleString()}`
    : "Seeded data · not yet live";
  $("#foot").innerHTML = live
    ? "Reading the private CRM endpoint. Crossing out an item is saved on this device only and never changes the sheet."
    : "Showing your seeded pipeline plus a sample of the CRM client book. To go live, deploy the included Apps Script and set <code>DATA_URL</code> at the top of this file — new Fathom-added prospects will then appear automatically. Cross-outs stay on this device and never touch the sheet.";
}

/* ---------- optional live load ---------- */
/* Maps the Apps Script's normalized column names onto the fields
   the app renders. Add any column names your sheet actually uses
   on the left if they differ (the script lowercases + underscores
   headers, so "Company Name" -> "company_name" automatically). */
const FIELD_MAP = {
  title:   ["company_name","client_name","group_name","name","task"],
  type:    ["group_type","pipeline_stage_type","record_type","type"],
  status:  ["group_status","pipeline_stage","status","stage"],
  notes:   ["notes","note","update_notes"],
  contact: ["primary_contact_name","contact_name","contact"],
  phone:   ["primary_contact_phone","contact_phone","phone","phone_number"],
  email:   ["primary_contact_email","contact_email","email"],
  carrier: ["carrier","peo","peo_carrier"],
  comp:    ["expected_comp","approx_commission","commission","comp"],
  date:    ["due_date","next_step_date","follow_up_date","date"],
  drive:   ["drive_folder_url","drive_folder","drive_link","folder_url"],
  sheetUrl:["sheet_url"],
  done:    ["done"],
};
function pick(row, keys){
  for(const k of keys){ if(row[k]!=null && row[k]!=="") return row[k]; }
  return "";
}
function rowsToItems(rows){
  return rows.filter(r=>pick(r,FIELD_MAP.title)).map((r)=>{
    const typeVal=pick(r,FIELD_MAP.type);
    const statusVal=pick(r,FIELD_MAP.status);
    const stage=stageFor(typeVal,statusVal);
    // Stable id: prefer the sheet's own group_id, fall back to the
    // sheet row number (both stay constant even if other rows shift),
    // so cross-out state doesn't drift onto the wrong item over time.
    const stableId = (r.group_id!=null && r.group_id!=="")
      ? "crm-g"+r.group_id
      : "crm-r"+(r.sheet_row!=null?r.sheet_row:Math.random());
    const doneVal = String(pick(r,FIELD_MAP.done)||"").trim().toLowerCase();
    const doneFromSheet = ["true","yes","x","done","1"].includes(doneVal);
    return {
      id:stableId,
      stage,
      title:String(pick(r,FIELD_MAP.title)).trim(),
      notes:String(pick(r,FIELD_MAP.notes)||""),
      contact:String(pick(r,FIELD_MAP.contact)||""),
      phone:String(pick(r,FIELD_MAP.phone)||""),
      email:String(pick(r,FIELD_MAP.email)||""),
      carrier:String(pick(r,FIELD_MAP.carrier)||""),
      comp:String(pick(r,FIELD_MAP.comp)||""),
      date:String(pick(r,FIELD_MAP.date)||""),
      drive:String(pick(r,FIELD_MAP.drive)||""),
      sheetUrl:String(pick(r,FIELD_MAP.sheetUrl)||""),
      doneFromSheet,
      // keep the raw row too, in case you want a field the UI doesn't show yet
      _raw:r
    };
  });
}
/* JSONP loader — sidesteps CORS entirely by loading the data through
   a <script> tag (which browsers never block cross-origin) instead of
   fetch(). The Apps Script responds with a callback(...) wrapper when
   it sees ?callback=, which is exactly what this expects. */
function loadJSONP(url, timeoutMs){
  return new Promise((resolve, reject)=>{
    const cbName = "__benemontCb" + Date.now();
    const script = document.createElement("script");
    let settled = false;

    const cleanup = ()=>{
      delete window[cbName];
      script.remove();
      clearTimeout(timer);
    };
    window[cbName] = (data)=>{
      if(settled) return;
      settled = true;
      cleanup();
      resolve(data);
    };
    const timer = setTimeout(()=>{
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("JSONP timed out"));
    }, timeoutMs || 10000);

    script.onerror = ()=>{
      if(settled) return;
      settled = true;
      cleanup();
      reject(new Error("JSONP script failed to load"));
    };

    const sep = url.includes("?") ? "&" : "?";
    script.src = url + sep + "callback=" + cbName;
    document.head.appendChild(script);
  });
}

async function init(){
  if(DATA_URL){
    try{
      const json = await loadJSONP(DATA_URL);
      if(json.error){ console.warn("Data endpoint error:",json.error); setSync(false); }
      else{
        const items=rowsToItems(json.rows||[]);
        if(items.length){
          DATA=items;
          // If the sheet's own "done" column says a to-do is finished,
          // reflect that locally too (sheet wins on load; tapping the
          // checkbox afterward still just updates this device, same
          // as everything else — the sheet is only ever read, never
          // written to by this app).
          let changed=false;
          items.forEach(i=>{ if(i.doneFromSheet && !done[i.id]){ done[i.id]=true; changed=true; } });
          if(changed) saveDone(done);
          setSync(true);
        } else setSync(false);
      }
    }catch(e){ console.warn("Live load failed, using seed:",e); setSync(false); }
  } else setSync(false);
  render();
}
init();
